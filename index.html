<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FutCollect - Álbum del Mundial</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', (event) => {
        document.body.innerHTML += '<div style="color:red; z-index:9999; position:absolute; top:0; background:white; padding:20px;">ERROR: ' + event.message + '</div>';
      });
      window.addEventListener('unhandledrejection', (event) => {
        document.body.innerHTML += '<div style="color:red; z-index:9999; position:absolute; top:0; background:white; padding:20px;">PROMISE ERROR: ' + event.reason + '</div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
