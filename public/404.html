<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>FutCollect</title>
    <!--
      Fallback SPA para GitHub Pages: GH Pages sirve este 404.html ante rutas
      desconocidas (p. ej. /noticias/algo al recargar). Reescribe la URL a la
      raíz con la ruta codificada en el query y deja que index.html la decodifique.
      pathSegmentsToKeep = 0 porque el sitio se sirve desde la raíz del dominio.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
